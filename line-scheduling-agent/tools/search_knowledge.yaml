openapi: "3.0.0"
info:
  title: Search Knowledge Base
  version: "1.0.0"
  description: >
    Searches the ChromaDB vector knowledge base for relevant domain
    knowledge chunks. Use this to retrieve constraint definitions,
    risk threshold explanations, and business rules by natural language
    query rather than relying on hardcoded system prompt context.
servers:
  - url: https://cameras-sense-preservation-mysql.trycloudflare.com
paths:
  /search_knowledge:
    get:
      operationId: search_knowledge
      summary: Retrieve relevant knowledge chunks by semantic query
      description: >
        Performs a semantic search over the scheduling domain knowledge base
        (constraint glossary, risk thresholds, business rules) and returns
        the top matching document chunks. Call this when you need to explain
        what a constraint means, what a risk level implies, or how the
        scheduler makes decisions. Pass intent to enable intent-aware
        threshold filtering. Pass n_results to override with a fixed count.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Natural language question or topic to search for
        - name: intent
          in: query
          required: false
          schema:
            type: string
            enum:
              - diagnostic
              - risk_assessment
              - availability
              - general
              - default
            default: default
          description: >
            Classified intent of the user question. Controls how many
            candidate chunks are retrieved and the distance threshold
            applied. If omitted, default config is used (max 6 candidates,
            threshold 0.50).
        - name: n_results
          in: query
          required: false
          schema:
            type: integer
          description: >
            Hard override for number of results. If set, bypasses
            intent-aware threshold filtering and returns exactly this
            many chunks. Use only when a fixed count is required.
      responses:
        "200":
          description: Matching knowledge chunks
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  intent:
                    type: string
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        type:
                          type: string
                        content:
                          type: string
                        distance:
                          type: number
                  chunks_returned:
                    type: integer
                  config_used:
                    type: object
                    properties:
                      max_candidates:
                        type: integer
                      threshold:
                        type: number
                      mode:
                        type: string
        "400":
          description: Missing query parameter
